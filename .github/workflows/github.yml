name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint API
        run: npm --workspace apps/api run lint --if-present

      - name: Build API
        run: npm run build:api

      - name: Build Web
        run: npm run build:web

      - name: Run API Tests
        run: npm --workspace apps/api run test --if-present

      - name: Run Web Tests
        run: npm --workspace apps/web run test --if-present
